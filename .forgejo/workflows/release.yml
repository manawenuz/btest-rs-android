name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git wget unzip nodejs curl python3

      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Set up JDK 17
        run: |
          wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.13+11/OpenJDK17U-jdk_x64_linux_hotspot_17.0.13_11.tar.gz -O /tmp/jdk.tar.gz
          mkdir -p /opt/java
          tar -xzf /tmp/jdk.tar.gz -C /opt/java --strip-components=1
          echo "JAVA_HOME=/opt/java" >> $GITHUB_ENV
          echo "/opt/java/bin" >> $GITHUB_PATH

      - name: Pre-download Gradle distribution
        run: |
          wget --timeout=120 -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -O /tmp/gradle-8.11.1-bin.zip \
            || wget --timeout=120 -q https://downloads.gradle-dn.com/distributions/gradle-8.11.1-bin.zip -O /tmp/gradle-8.11.1-bin.zip
          sed -i 's|distributionUrl=.*|distributionUrl=file\\:///tmp/gradle-8.11.1-bin.zip|' gradle/wrapper/gradle-wrapper.properties

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          mkdir -p /opt/android/cmdline-tools
          unzip -q /tmp/cmdtools.zip -d /opt/android/cmdline-tools
          mv /opt/android/cmdline-tools/cmdline-tools /opt/android/cmdline-tools/latest
          yes | /opt/android/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          /opt/android/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_HOME=/opt/android" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android" >> $GITHUB_ENV
          echo "/opt/android/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/opt/android/platform-tools" >> $GITHUB_PATH

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create release and upload APKs
        env:
          TAG: ${{ github.ref_name }}
          GITEA_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          FORGEJO_URL: https://git.tbs.amn.gg
          REPO: manawenuz/btest-rs-android
        run: |
          cp app/build/outputs/apk/release/app-release.apk "btest-${TAG}-release.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "btest-${TAG}-debug.apk"

          AUTH="Authorization: token ${GITEA_TOKEN}"
          API="${FORGEJO_URL}/api/v1/repos/${REPO}/releases"
          BODY="Automated build for ${TAG}.\n\n## Artifacts\n- btest-${TAG}-release.apk — signed, minified release build\n- btest-${TAG}-debug.apk — debug build"

          # Check if release already exists for this tag
          RELEASE_ID=$(curl -s "${API}/tags/${TAG}" -H "${AUTH}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || true)

          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "" ]; then
            echo "Release exists (ID: ${RELEASE_ID}), deleting old assets..."
            ASSET_IDS=$(curl -s "${API}/${RELEASE_ID}/assets" -H "${AUTH}" | python3 -c "import sys,json; [print(a['id']) for a in json.load(sys.stdin)]" 2>/dev/null || true)
            for aid in $ASSET_IDS; do
              curl -s -X DELETE "${API}/${RELEASE_ID}/assets/${aid}" -H "${AUTH}"
            done
            # Update release body
            curl -s -X PATCH "${API}/${RELEASE_ID}" -H "${AUTH}" -H "Content-Type: application/json" \
              -d "{\"body\":\"${BODY}\"}" > /dev/null
          else
            echo "Creating new release..."
            RELEASE_ID=$(curl -sf -X POST "${API}" \
              -H "Content-Type: application/json" \
              -H "${AUTH}" \
              -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"body\":\"${BODY}\"}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          fi

          echo "Release ID: ${RELEASE_ID}"

          curl -sf -X POST "${API}/${RELEASE_ID}/assets?name=btest-${TAG}-release.apk" \
            -H "${AUTH}" -F "attachment=@btest-${TAG}-release.apk"

          curl -sf -X POST "${API}/${RELEASE_ID}/assets?name=btest-${TAG}-debug.apk" \
            -H "${AUTH}" -F "attachment=@btest-${TAG}-debug.apk"

          echo "Uploaded both APKs to Forgejo release ${TAG}"

      - name: Install GitHub CLI
        run: |
          wget -q https://github.com/cli/cli/releases/download/v2.67.0/gh_2.67.0_linux_amd64.tar.gz -O /tmp/gh.tar.gz
          tar -xzf /tmp/gh.tar.gz -C /tmp
          cp /tmp/gh_2.67.0_linux_amd64/bin/gh /usr/local/bin/gh

      - name: Upload to GitHub Release
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release create "${TAG}" \
            --repo manawenuz/btest-rs-android \
            --title "${TAG}" \
            --notes "Automated build for ${TAG}." \
            "btest-${TAG}-release.apk" \
            "btest-${TAG}-debug.apk" \
          || gh release upload "${TAG}" \
            --repo manawenuz/btest-rs-android \
            --clobber \
            "btest-${TAG}-release.apk" \
            "btest-${TAG}-debug.apk"
          echo "Uploaded both APKs to GitHub release ${TAG}"
