name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: docker
    container:
      image: thyrlian/android-sdk:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        run: |
          apt-get update -qq && apt-get install -y -qq openjdk-17-jdk-headless file > /dev/null
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create release and upload APKs
        env:
          TAG: ${{ github.ref_name }}
          GITEA_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          FORGEJO_URL: https://git.tbs.amn.gg
          REPO: manawenuz/btest-rs-anrdoid
        run: |
          # Rename APKs with version
          cp app/build/outputs/apk/release/app-release.apk "btest-${TAG}-release.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "btest-${TAG}-debug.apk"

          NOTES="Automated build for ${TAG}.

          ## Artifacts
          - \`btest-${TAG}-release.apk\` — signed, minified release build
          - \`btest-${TAG}-debug.apk\` — debug build"

          # Create release
          RELEASE_ID=$(curl -sf -X POST "${FORGEJO_URL}/api/v1/repos/${REPO}/releases" \
            -H "Content-Type: application/json" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"body\":$(echo "$NOTES" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          echo "Created release ID: ${RELEASE_ID}"

          # Upload release APK
          curl -sf -X POST "${FORGEJO_URL}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=btest-${TAG}-release.apk" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@btest-${TAG}-release.apk"

          # Upload debug APK
          curl -sf -X POST "${FORGEJO_URL}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=btest-${TAG}-debug.apk" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@btest-${TAG}-debug.apk"

          echo "Uploaded both APKs to release ${TAG}"
