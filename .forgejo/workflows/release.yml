name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Set up JDK 17
        run: |
          apt-get update && apt-get install -y wget unzip
          wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.13%2B11/OpenJDK17U-jdk_x64_linux_hotspot_17.0.13_11.tar.gz -O /tmp/jdk.tar.gz
          mkdir -p /opt/java
          tar -xzf /tmp/jdk.tar.gz -C /opt/java --strip-components=1
          echo "JAVA_HOME=/opt/java" >> $GITHUB_ENV
          echo "/opt/java/bin" >> $GITHUB_PATH

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          mkdir -p /opt/android/cmdline-tools
          unzip -q /tmp/cmdtools.zip -d /opt/android/cmdline-tools
          mv /opt/android/cmdline-tools/cmdline-tools /opt/android/cmdline-tools/latest
          yes | /opt/android/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          /opt/android/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_HOME=/opt/android" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android" >> $GITHUB_ENV
          echo "/opt/android/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/opt/android/platform-tools" >> $GITHUB_PATH

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create release and upload APKs
        env:
          TAG: ${{ github.ref_name }}
          GITEA_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          FORGEJO_URL: https://git.tbs.amn.gg
          REPO: manawenuz/btest-rs-android
        run: |
          cp app/build/outputs/apk/release/app-release.apk "btest-${TAG}-release.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "btest-${TAG}-debug.apk"

          RELEASE_ID=$(curl -sf -X POST "${FORGEJO_URL}/api/v1/repos/${REPO}/releases" \
            -H "Content-Type: application/json" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"body\":\"Automated build for ${TAG}.\\n\\n## Artifacts\\n- \`btest-${TAG}-release.apk\` — signed, minified release build\\n- \`btest-${TAG}-debug.apk\` — debug build\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          echo "Created release ID: ${RELEASE_ID}"

          curl -sf -X POST "${FORGEJO_URL}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=btest-${TAG}-release.apk" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@btest-${TAG}-release.apk"

          curl -sf -X POST "${FORGEJO_URL}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=btest-${TAG}-debug.apk" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@btest-${TAG}-debug.apk"

          echo "Uploaded both APKs to release ${TAG}"
